# This file is generated from athackst/ci/copier/template/.github/ci-config.yml.jinja.
# Do not edit directly; update the template instead.

name-template: "Release v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
template: |
  # Get it

  ## Python

  Install it with pip

  ```bash
  pip install mkdocs-simple-plugin==$RESOLVED_VERSION
  ```
  See it on pypi: [https://pypi.org/project/mkdocs-simple-plugin](https://pypi.org/project/mkdocs-simple-plugin/$RESOLVED_VERSION/)

  ## Docker

  Pull it with docker

  ```bash
  docker pull althack/mkdocs-simple-plugin:v$RESOLVED_VERSION
  ```

  See it on dockerhub: [https://hub.docker.com/repository/docker/althack/mkdocs-simple-plugin](https://hub.docker.com/repository/docker/althack/mkdocs-simple-plugin)

  ## Github

  ```yaml
  - name: Build docs
    uses: athackst/mkdocs-simple-plugin:v$RESOLVED_VERSION
  ```

  See it in the actions marketplace: [https://github.com/marketplace/actions/mkdocs-simple-action](https://github.com/marketplace/actions/mkdocs-simple-action)

  # What’s Changed

  $CHANGES

categories:
  - type: pre-exclude
    when:
      label: skip-changelog
  - title: ':zap: Breaking'
    exclusive: true
    semver-increment: major
    when:
      labels:
        - 'breaking'
        - 'major'
  - title: ':rocket: New'
    exclusive: true
    semver-increment: minor
    when:
      labels:
        - 'feature'
        - 'enhancement'
  - title: ':bug: Bug Fixes'
    exclusive: true
    semver-increment: patch
    when:
      labels:
        - 'bug'
        - 'fix'
  - title: ':toolbox: Maintenance'
    exclusive: true
    semver-increment: patch
    when:
      labels:
        - 'maintenance'
        - 'devops'
  - title: ':memo: Documentation'
    exclusive: true
    semver-increment: patch
    when:
      labels:
        - 'docs'
        - 'documentation'
  - title: 'Dependency Updates'
    exclusive: true
    semver-increment: patch
    collapse-after: 3
    when:
      label: dependencies
  - type: version-resolver
    semver-increment: minor
    when:
      label: minor
  - type: version-resolver
    semver-increment: patch
    when:
      label: security

labels:
  breaking:
    - head-branch: ["^major", "^break"]
    - description: "Breaking or major-version change"
    - color: "#7f1d1d"

  bug:
    - head-branch: ['^fix', '^bug']
    - description: "Something isn't working"
    - color: "#d73a4a"

  enhancement:
    - head-branch: ["^feat", "^new", "^enhance"]
    - description: "New feature or request"
    - color: "#0f766e"
    
  maintenance:
    - head-branch: ['^chore', '^maint', '^noop', '^no-op', '^upkeep', '^dev']
    - changed-files:
      - any-glob-to-any-file: [".github/**", ".vscode/**"]
    - description: "Non-behavior related change"
    - color: "#0ea5e9"

  dependencies:
    - head-branch: ['^deps', '^dependencies']
    - description: "Pull requests that update a dependency file"
    - color: "#1d4ed8"

  documentation:
    - changed-files:
      - any-glob-to-any-file: "**/*.md"
    - head-branch: ["^doc"]
    - description: "Improvements or additions to documentation"
    - color: "#64748b"

  automerge:
    - head-branch: ['^dependabot/']
    - description: "Automatically merge"
    - color: "#eab308"

  good first issue:
    - description: "Good for newcomers"
    - color: "#c4b5fd"

  help wanted:
    - description: "Extra attention is needed"
    - color: "#db2777"

  question:
    - description: "Further information is requested"
    - color: "#7e22ce"

  duplicate:
    - description: "This is a duplicate"
    - color: "#cbd5e1"

  invalid:
    - description: "This doesn't seem right"
    - color: "#a3a3a3"
  
  wontfix:
    - description: "This will not be worked on"
    - color: "#78716c"
